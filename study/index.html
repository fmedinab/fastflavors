<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Préstamos - Sistema Estudiantil</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #D32F2F;
      --primary-dark: #B71C1C;
      --secondary: #FF5722;
      --accent: #FFA726;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      min-height: 100vh;
      padding: 0;
      padding-top: 140px;
      padding-bottom: 30px;
    }

    .top-header-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 130px;
      background: var(--primary);
      z-index: 100;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-container {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 101;
    }

    .logo-img-header {
      max-width: 110px;
      height: auto;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 15px;
    }

    /* Header */
    .header {
      background: white;
      border-radius: 16px;
      padding: 20px 15px;
      margin-bottom: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    .header h1 {
      font-size: 1.8rem;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .header .brand {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .header .brand-name {
      color: var(--primary);
    }

    .header .brand-text {
      color: var(--accent);
    }

    .header p {
      color: #666;
      font-size: 1rem;
    }

    /* Search Section */
    .search-section {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .search-label {
      font-size: 1.1rem;
      color: #333;
      margin-bottom: 12px;
      display: block;
      font-weight: bold;
    }

    .search-input {
      width: 100%;
      padding: 14px;
      font-size: 1.1rem;
      border: 3px solid #e0e0e0;
      border-radius: 12px;
      transition: all 0.3s;
      text-align: center;
      font-weight: bold;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--secondary);
      transform: scale(1.02);
    }

    .search-hint {
      margin-top: 10px;
      color: #999;
      font-size: 0.9rem;
      text-align: center;
    }

    /* Student Info Card */
    .student-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: none;
    }

    .student-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 15px;
      text-align: center;
    }

    .student-header h2 {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }

    .student-header p {
      font-size: 1rem;
      opacity: 0.9;
      margin: 3px 0;
    }

    /* Debt Summary */
    .debt-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .debt-item {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .debt-item-label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .debt-item-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--secondary);
    }

    .debt-item.total {
      background: linear-gradient(135deg, #D32F2F20 0%, #FF572220 100%);
    }

    .debt-item.total .debt-item-value {
      font-size: 2rem;
      color: var(--primary-dark);
    }

    /* Loans List */
    .loans-section h3 {
      font-size: 1.3rem;
      color: #333;
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 3px solid var(--secondary);
    }

    .loan-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      border-left: 5px solid var(--secondary);
      transition: all 0.3s;
    }

    .loan-card:hover {
      transform: translateX(3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .loan-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e0e0e0;
      flex-wrap: wrap;
      gap: 8px;
    }

    .loan-datetime {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .loan-date-field {
      font-size: 0.85rem;
      color: #666;
      font-weight: 500;
    }

    .loan-time-field {
      font-size: 0.8rem;
      color: #999;
    }

    .loan-status {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
      text-align: center;
    }

    .loan-status.pending {
      background: #fff3cd;
      color: #856404;
    }

    .loan-status.paid {
      background: #d4edda;
      color: #155724;
    }

    .loan-total {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--primary-dark);
      min-width: 90px;
      text-align: right;
    }

    .loan-header.paid .loan-total {
      color: #4caf50;
    }

    .loan-items {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .loan-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: white;
      border-radius: 8px;
      border-left: 3px solid var(--accent);
    }

    .loan-item-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .loan-item-name {
      font-size: 1rem;
      color: #333;
      font-weight: 600;
    }

    .loan-item-id {
      font-size: 0.75rem;
      color: #999;
    }

    .loan-item-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }

    .loan-item-quantity {
      font-size: 0.8rem;
      color: #666;
      background: #e9ecef;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .loan-item-price {
      font-size: 1rem;
      font-weight: bold;
      color: var(--secondary);
    }

    .loan-item-price.paid-price {
      color: #4caf50;
      text-decoration: line-through;
      opacity: 0.9;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 1.3rem;
      margin-bottom: 8px;
      color: #666;
    }

    .empty-state p {
      font-size: 1rem;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 30px;
      font-size: 1.1rem;
      color: #667eea;
    }

    /* Back Button */
    .back-btn {
      background: white;
      color: var(--primary);
      border: 3px solid var(--primary);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      display: block;
      margin: 15px auto 0;
    }

    .back-btn:hover {
      background: var(--primary);
      color: white;
      transform: scale(1.05);
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        padding-top: 132px;
      }
      .top-header-bar {
        height: 120px;
      }
      .logo-img-header {
        max-width: 90px;
      }
      .header h1 {
        font-size: 1.5rem;
        margin-bottom: 4px;
      }
      .header p {
        font-size: 0.9rem;
      }
      .header .brand {
        font-size: 0.9rem;
      }
      .search-label {
        font-size: 1rem;
      }
      .search-input {
        font-size: 1rem;
        padding: 12px;
      }
      .student-header h2 {
        font-size: 1.4rem;
        margin-bottom: 6px;
      }
      .student-header p {
        font-size: 0.9rem;
      }
      .debt-item-value {
        font-size: 1.4rem;
      }
      .debt-item.total .debt-item-value {
        font-size: 1.6rem;
      }
      .loan-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .loans-section h3 {
        font-size: 1.15rem;
      }
      .loan-total {
        font-size: 1.2rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding-top: 125px;
        padding-bottom: 20px;
      }
      .top-header-bar {
        height: 110px;
      }
      .logo-img-header {
        max-width: 75px;
      }
      .header {
        padding: 15px 12px;
        margin-bottom: 12px;
        border-radius: 12px;
      }
      .header h1 {
        font-size: 1.2rem;
        margin-bottom: 2px;
      }
      .header .brand {
        font-size: 0.8rem;
        margin-bottom: 6px;
      }
      .header p {
        font-size: 0.8rem;
      }
      .search-section {
        padding: 15px 12px;
        border-radius: 12px;
      }
      .search-label {
        font-size: 0.9rem;
        margin-bottom: 10px;
      }
      .search-input {
        font-size: 1rem;
        padding: 11px;
        border-radius: 10px;
      }
      .search-hint {
        font-size: 0.8rem;
        margin-top: 8px;
      }
      .student-card {
        padding: 15px;
        margin-bottom: 12px;
        border-radius: 12px;
      }
      .student-header {
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 12px;
      }
      .student-header h2 {
        font-size: 1.2rem;
        margin-bottom: 4px;
      }
      .student-header p {
        font-size: 0.85rem;
        margin: 2px 0;
      }
      .debt-summary {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 12px;
      }
      .debt-item {
        padding: 12px 10px;
        border-radius: 10px;
      }
      .debt-item-label {
        font-size: 0.75rem;
        margin-bottom: 4px;
      }
      .debt-item-value {
        font-size: 1.3rem;
      }
      .debt-item.total .debt-item-value {
        font-size: 1.4rem;
      }
      .loans-section h3 {
        font-size: 1rem;
        margin-bottom: 12px;
        padding-bottom: 6px;
      }
      .loan-card {
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 10px;
      }
      .loan-header {
        margin-bottom: 10px;
        padding-bottom: 6px;
        gap: 6px;
      }
      .loan-datetime {
        gap: 2px;
      }
      .loan-date-field {
        font-size: 0.75rem;
      }
      .loan-time-field {
        font-size: 0.7rem;
      }
      .loan-status {
        padding: 3px 8px;
        font-size: 0.7rem;
      }
      .loan-total {
        font-size: 1rem;
        min-width: 80px;
      }
      .loan-items {
        gap: 5px;
      }
      .loan-item {
        padding: 8px;
        border-radius: 6px;
      }
      .loan-item-name {
        font-size: 0.9rem;
      }
      .loan-item-id {
        font-size: 0.7rem;
      }
      .loan-item-quantity {
        font-size: 0.7rem;
        padding: 1px 4px;
      }
      .loan-item-price {
        font-size: 0.9rem;
      }
      .back-btn {
        padding: 8px 16px;
        font-size: 0.9rem;
        margin: 12px auto 0;
      }
    }

    @media (max-width: 360px) {
      body {
        padding-top: 120px;
      }
      .top-header-bar {
        height: 105px;
      }
      .logo-img-header {
        max-width: 60px;
      }
      .header h1 {
        font-size: 1.05rem;
      }
      .student-header h2 {
        font-size: 1.1rem;
      }
      .debt-item-value {
        font-size: 1.1rem;
      }
      .loan-item-name {
        font-size: 0.8rem;
      }
    }

    /* Animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .student-card, .loan-card {
      animation: fadeIn 0.5s ease-out;
    }

    /* Dark Mode */
    @media (prefers-color-scheme: dark) {
      body {
        background: #121212;
      }
      .header, .search-section, .student-card {
        background: #1e1e1e;
        color: #e0e0e0;
      }
      .header h1, .search-title, .history-title, .debt-item-label {
        color: #e0e0e0;
      }
      .debt-item, .loan-card {
        background: #2d2d2d;
      }
      .loan-header {
        border-bottom-color: #444;
      }
      .loan-product {
        background: #1e1e1e;
        color: #b0b0b0;
      }
      .search-input {
        background: #2d2d2d;
        color: #e0e0e0;
        border-color: #444;
      }
      .back-btn {
        background: #1e1e1e;
        color: #FF5722;
        border-color: #FF5722;
      }
      .back-btn:hover {
        background: #FF5722;
        color: white;
      }
    }
  </style>
</head>
<body>
  <!-- Red Top Header Bar -->
  <div class="top-header-bar">
    <div class="logo-container">
      <img src="../logo.png" alt="Fast Flavors Logo" class="logo-img-header">
    </div>
  </div>

  <div class="container">
    
    <!-- Header -->
    <div style="position: absolute; top: 15px; left: 15px;">
      <a href="../loans/" style="color: white; font-size: 1rem; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 20px; font-weight: bold;" title="Volver al inicio">
        🏠 Volver
      </a>
    </div>
    <div class="header">
      <div class="brand"><span class="brand-name">Fast</span> <span class="brand-text">Flavors</span></div>
      <h1>💰 Mis Préstamos</h1>
      <p>Consulta tus compras y deuda pendiente</p>
    </div>

    <!-- Search Section -->
    <div class="search-section">
      <label class="search-label">🔍 Ingresa tu código de estudiante</label>
      <input 
        type="text" 
        class="search-input" 
        id="studentCode" 
        placeholder="Ejemplo: EST001"
        autocomplete="off"
      >
      <p class="search-hint">💡 Encuentra tu código en tu carnet estudiantil</p>
    </div>

    <!-- Student Info Card -->
    <div class="student-card" id="studentCard">
      
      <!-- Student Header -->
      <div class="student-header">
        <h2 id="studentName">Nombre del Estudiante</h2>
        <p id="studentGrade">🎓 Grado y Sección</p>
        <p id="studentCode2">📝 Código</p>
      </div>

      <!-- Debt Summary -->
      <div class="debt-summary">
        <div class="debt-item">
          <div class="debt-item-label">📦 Préstamos</div>
          <div class="debt-item-value" id="totalLoans">0</div>
        </div>
        <div class="debt-item">
          <div class="debt-item-label">🧾 Productos</div>
          <div class="debt-item-value" id="totalItems">0</div>
        </div>
        <div class="debt-item total">
          <div class="debt-item-label">💳 Deuda Total</div>
          <div class="debt-item-value">S/ <span id="totalDebt">0.00</span></div>
        </div>
      </div>

      <!-- Loans List -->
      <div class="loans-section">
        <h3>📋 Historial de Préstamos</h3>
        <div id="loansList">
          <div class="loading">⏳ Cargando préstamos...</div>
        </div>
      </div>

      <button class="back-btn" onclick="resetSearch()">← Buscar otro estudiante</button>
    </div>

  </div>

  <script src="../js/config.js"></script>
  <script>
    let currentStudent = null;
    let searchTimeout = null;
    let studentsCache = []; // Cache global de estudiantes
    let cacheLoaded = false; // Indicador si el cache está listo

    // Cargar estudiantes una sola vez al iniciar
    async function loadStudentsCache() {
      try {
        const response = await fetch(`${CONFIG.API_URL}?action=getStudents`);
        const data = await response.json();
        
        if (data.success) {
          studentsCache = data.data?.students || data.students || [];
          cacheLoaded = true;
          console.log(`✅ ${studentsCache.length} estudiantes cargados en cache`);
        } else {
          console.warn('⚠️ Error cargando cache de estudiantes');
        }
      } catch (error) {
        console.error('Error loading students cache:', error);
      }
    }

    // Mostrar loader visual
    function showSearchLoader() {
      document.getElementById('loansList').innerHTML = '<div class="loading">🔍 Buscando estudiante...</div>';
    }

    function showLoading() {
      document.getElementById('loansList').innerHTML = '<div class="loading">⏳ Cargando préstamos...</div>';
    }

    // Search functionality with debounce
    document.getElementById('studentCode').addEventListener('input', (e) => {
      const code = e.target.value.trim().toUpperCase();
      
      // Clear previous timeout
      if (searchTimeout) {
        clearTimeout(searchTimeout);
      }
      
      if (code.length >= 3) {
        // Wait 600ms after user stops typing before searching
        searchTimeout = setTimeout(() => {
          searchStudent(code);
        }, 600);
      }
    });

    document.getElementById('studentCode').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        // Clear timeout and search immediately
        if (searchTimeout) {
          clearTimeout(searchTimeout);
        }
        const code = e.target.value.trim().toUpperCase();
        if (code.length >= 3) {
          searchStudent(code);
        }
      }
    });

    async function searchStudent(code) {
      try {
        // Si el cache no está listo, esperar a que cargue
        if (!cacheLoaded) {
          console.log('⏳ Esperando cache de estudiantes...');
          showSearchLoader();
          await loadStudentsCache();
        }

        // Buscar en el cache
        const student = studentsCache.find(s => 
          String(s.codigo).toUpperCase() === code.toUpperCase()
        );

        if (!student) {
          // Si no encontró, mostrar mensaje sin alert
          document.getElementById('studentCard').style.display = 'block';
          document.getElementById('loansList').innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🔍</div>
              <h3>Código no encontrado</h3>
              <p>Verifica que el código sea correcto (Ejemplo: EST001)</p>
            </div>
          `;
          return;
        }

        currentStudent = student;
        await loadStudentData(student);

      } catch (error) {
        console.error('Error searching student:', error);
        document.getElementById('loansList').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <h3>Error al conectar</h3>
            <p>Por favor recarga la página e intenta nuevamente</p>
          </div>
        `;
      }
    }

    async function loadStudentData(student) {
      try {
        // Show student card
        document.getElementById('studentCard').style.display = 'block';
        document.getElementById('studentName').textContent = student.nombre;
        document.getElementById('studentGrade').textContent = `🎓 ${student.grado} - ${student.seccion}`;
        document.getElementById('studentCode2').textContent = `📝 Código: ${student.codigo}`;

        // Show loading
        showLoading();

        // Get student loans and debt
        const loansResponse = await fetch(`${CONFIG.API_URL}?action=getStudentLoans&studentCode=${student.codigo}`);
        const loansData = await loansResponse.json();

        console.log('📊 Datos de préstamos:', loansData);

        if (loansData.success) {
          // Manejar ambas estructuras: data.loans o loans directamente
          const loans = loansData.data?.loans || loansData.loans || [];
          const summary = loansData.data?.summary || loansData.summary || {};
          
          displayLoans(loans, summary);
        } else {
          document.getElementById('loansList').innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📭</div>
              <h3>No hay préstamos registrados</h3>
              <p>¡Genial! No tienes deudas pendientes</p>
            </div>
          `;
        }

      } catch (error) {
        console.error('Error loading student data:', error);
        document.getElementById('loansList').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">❌</div>
            <h3>Error al cargar datos</h3>
            <p>Por favor intenta nuevamente</p>
          </div>
        `;
      }
    }

    function displayLoans(loans, summary) {
      // Validar que summary existe y tiene valores
      const totalLoans = summary?.totalLoans || 0;
      const totalItems = summary?.totalItems || 0;
      const totalDebt = summary?.totalDebt || 0;

      // Update summary
      document.getElementById('totalLoans').textContent = totalLoans;
      document.getElementById('totalItems').textContent = totalItems;
      document.getElementById('totalDebt').textContent = totalDebt.toFixed(2);

      const loansList = document.getElementById('loansList');

      if (!loans || loans.length === 0) {
        loansList.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">✨</div>
            <h3>¡Sin préstamos!</h3>
            <p>No tienes deudas pendientes</p>
          </div>
        `;
        return;
      }

      loansList.innerHTML = loans.map(loan => {
        const estado = loan.estado || 'PENDIENTE';
        const statusClass = estado === 'PAGADO' ? 'paid' : 'pending';
        const statusEmoji = estado === 'PAGADO' ? '✅' : '⏳';
        
        return `
          <div class="loan-card">
            <div class="loan-header ${statusClass}">
              <div class="loan-datetime">
                <div class="loan-date-field">📅 ${formatDateShort(loan.fecha)}</div>
                <div class="loan-time-field">⏰ ${formatTime(loan.hora)}</div>
              </div>
              <div class="loan-status ${statusClass}">
                ${statusEmoji} ${estado}
              </div>
              <div class="loan-total">${estado === 'PAGADO' ? '✓ Pagado: ' : ''}S/ ${loan.total.toFixed(2)}</div>
            </div>
            <div class="loan-items">
              ${loan.items.map(item => {
                const itemEstado = item.estado || 'PENDIENTE';
                const priceLabel = itemEstado === 'PAGADO' ? '✓ Pagó: ' : '';
                return `
                <div class="loan-item">
                  <div class="loan-item-info">
                    <div class="loan-item-name">${item.emoji || '📦'} ${item.nombre}</div>
                    <div class="loan-item-id">ID: ${item.id || 'N/A'}</div>
                  </div>
                  <div class="loan-item-right">
                    <div class="loan-item-quantity">Cantidad: ${item.cantidad}</div>
                    <div class="loan-item-price ${itemEstado === 'PAGADO' ? 'paid-price' : ''}">${priceLabel}S/ ${item.precio.toFixed(2)}</div>
                  </div>
                </div>
              `;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function formatDateShort(dateString) {
      try {
        // Si no hay fecha, retornar vacío
        if (!dateString) return 'Fecha no disponible';
        
        let year, month, day;
        
        // Si es un timestamp ISO (contiene T)
        if (dateString.includes('T')) {
          const date = new Date(dateString);
          year = date.getFullYear();
          month = String(date.getMonth() + 1).padStart(2, '0');
          day = String(date.getDate()).padStart(2, '0');
        } else {
          // Si es formato YYYY-MM-DD
          const parts = dateString.toString().split('-');
          year = parts[0];
          month = parts[1];
          day = parts[2];
        }
        
        const date = new Date(year, month - 1, day);
        const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const months = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                        'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        
        const dayName = days[date.getDay()];
        const monthName = months[date.getMonth()];
        
        return `${dayName}, ${day} de ${monthName} ${year}`;
      } catch (e) {
        return 'Fecha no disponible';
      }
    }

    function formatTime(timeString) {
      try {
        // Si no hay tiempo, retornar vacío
        if (!timeString) return 'Hora no disponible';
        
        // Si es un timestamp ISO (contiene T)
        if (timeString.includes('T')) {
          const date = new Date(timeString);
          const hours = String(date.getHours()).padStart(2, '0');
          const minutes = String(date.getMinutes()).padStart(2, '0');
          return `${hours}:${minutes}`;
        }
        
        // Si ya está en formato HH:mm
        return timeString;
      } catch (e) {
        return 'Hora no disponible';
      }
    }

    function resetSearch() {
      document.getElementById('studentCard').style.display = 'none';
      document.getElementById('studentCode').value = '';
      document.getElementById('studentCode').focus();
      currentStudent = null;
    }

    // Load cache and focus on load
    window.addEventListener('load', async () => {
      console.log('📱 Iniciando aplicación...');
      await loadStudentsCache();
      document.getElementById('studentCode').focus();
    });
  </script>
